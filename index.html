<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src = "script.js" defer></script>
</head>
<body>
    <div id="calculator">
        <div id="display"></div>
        <div id="buttons">
            <button id = "clear">C</button><button id = "del">⌫</button><button class="ops">/</button><button class="ops">*</button>
            <button class ="number">7</button><button class = "number">8</button><button class = "number">9</button><button class="ops">-</button>
            <button class = "number">4</button><button class = "number">5</button><button class = "number">6</button><button class="ops">+</button>
            <button class = "number">3</button><button class = "number">2</button><button class = "number">1</button><button id="equal">=</button>
            <button class ="number" id="half-left">0</button><button id="half-right">.</button>
        </div>
</body>
</html>
